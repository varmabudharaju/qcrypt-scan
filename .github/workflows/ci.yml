name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (auto-builds CLI + web via prepare hook)
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Verify packageable tarball
        run: npm pack --dry-run

      - name: Verify CLI runs
        run: node dist/cli.js --version

  secret-scan:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
